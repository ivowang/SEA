# SFT LoRA evolution config
evolution:
  evolvers:
    - method: sft
      target: brain
      device: "cuda:1"
      learning_rate: 2.0e-5
      num_epochs: 3
      batch_size: 4
      gradient_accumulation_steps: 4
      max_seq_length: 2048
      reward_threshold: 0.0
      output_dir: outputs/sft
      torch_dtype: bfloat16
